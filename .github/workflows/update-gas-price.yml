name: ガソリン価格 自動更新

on:
  schedule:
    # 毎週水曜 21:30 JST（= 12:30 UTC）。資源エネルギー庁の週次調査は水曜公表
    - cron: "30 12 * * 3"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 価格を取得して data.js を更新
        run: python3 scripts/update_gas_price.py

      - name: 更新後の data.js を検証
        run: node scripts/validate_data.js

      - name: 変更があればコミットしてPages再ビルド
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "gas-price-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet data.js; then
            git add data.js
            git commit -m "ガソリン価格を自動更新"
            git push
            # GITHUB_TOKENによるpushではPagesの自動ビルドが走らないため明示的に要求する
            gh api -X POST "repos/${{ github.repository }}/pages/builds"
          else
            echo "変更なし"
          fi
